name: Publish Docker image to GHCR

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.sha }}
          fetch-depth: 1

      - name: Prepare build metadata
        id: build
        run: |
          BASE_VERSION=$(tr -d '\r\n' < VERSION)
          if [ -z "$BASE_VERSION" ]; then
            echo "::error::VERSION must contain the upstream version"
            exit 1
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_VERSION="${BASE_VERSION}-${SHORT_SHA}"
          echo "$BUILD_VERSION" > VERSION

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/team-s2/new-api:${{ matrix.arch }}
            ghcr.io/team-s2/new-api:${{ steps.build.outputs.short_sha }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/team-s2/new-api
            org.opencontainers.image.revision=${{ steps.build.outputs.revision }}
            org.opencontainers.image.version=${{ steps.build.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Publish summary
        env:
          SHORT_SHA: ${{ steps.build.outputs.short_sha }}
          VERSION: ${{ steps.build.outputs.version }}
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
        run: echo "Published \`$ARCH\` and \`$SHORT_SHA-$ARCH\` with VERSION \`$VERSION\` for \`$PLATFORM\`." >> "$GITHUB_STEP_SUMMARY"

  manifest:
    name: Publish multi-platform manifest
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.sha }}
          fetch-depth: 1

      - name: Prepare build metadata
        id: build
        run: |
          BASE_VERSION=$(tr -d '\r\n' < VERSION)
          if [ -z "$BASE_VERSION" ]; then
            echo "::error::VERSION must contain the upstream version"
            exit 1
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_VERSION="${BASE_VERSION}-${SHORT_SHA}"

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifests
        env:
          SHORT_SHA: ${{ steps.build.outputs.short_sha }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/team-s2/new-api:latest \
            "ghcr.io/team-s2/new-api:${SHORT_SHA}-amd64" \
            "ghcr.io/team-s2/new-api:${SHORT_SHA}-arm64"

          docker buildx imagetools create \
            --tag "ghcr.io/team-s2/new-api:${SHORT_SHA}" \
            "ghcr.io/team-s2/new-api:${SHORT_SHA}-amd64" \
            "ghcr.io/team-s2/new-api:${SHORT_SHA}-arm64"

      - name: Publish summary
        env:
          SHORT_SHA: ${{ steps.build.outputs.short_sha }}
          VERSION: ${{ steps.build.outputs.version }}
        run: echo "Published multi-platform manifests \`latest\` and \`$SHORT_SHA\` with VERSION \`$VERSION\`." >> "$GITHUB_STEP_SUMMARY"
